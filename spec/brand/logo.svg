<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1A1A1A"/>

  <!-- Three Gantt-style bars -->
  <rect x="200" y="148" width="140" height="36" rx="8" fill="#FB8C00"/>
  <rect x="200" y="210" width="210" height="36" rx="8" fill="#F57C00"/>
  <rect x="200" y="272" width="180" height="36" rx="8" fill="#E65100"/>

  <!-- Checkmark / clock hand — the "tick" -->
  <polyline
    points="112,240 140,272 172,192"
    fill="none"
    stroke="#FFB74D"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
