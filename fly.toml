# fly.toml app configuration file generated for ai-cinema-claude on 2026-03-20T14:32:15+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-cinema-claude'
primary_region = 'arn'

[deploy]
  strategy = 'immediate'
  ha = false

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
