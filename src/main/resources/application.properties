spring.datasource.url=jdbc:h2:file:./data/cinema;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Serve posters from root posters/ directory
spring.web.resources.static-locations=file:./posters/,classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/
